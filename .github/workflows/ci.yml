name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repo-contract:
    name: Repo Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make root scripts executable
        run: chmod +x scripts/*.sh scripts/pre-commit

      - name: Verify repo contract
        run: make verify-repo

  playwright-local:
    name: Playwright Local Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/playwright
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run local contract checks
        run: npm run verify

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-local-artifacts
          path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
          if-no-files-found: ignore

  ios-health:
    name: iOS Health Check
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh native-ios/scripts/healthcheck.sh

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run iOS verification
        run: SKIP_REMOTE_CHECKS=1 make verify-ios

  android-health:
    name: Android Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh native-android/gradlew native-android/scripts/healthcheck.sh

      - name: Run Android verification
        run: SKIP_REMOTE_CHECKS=1 make verify-android

      - name: Upload Android build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            native-android/app/build/outputs/apk/debug/app-debug.apk
            native-android/app/build/outputs/bundle/release/
          if-no-files-found: ignore

