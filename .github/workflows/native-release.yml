name: Native Release Readiness

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which platform artifacts should be built"
        type: choice
        required: true
        default: both
        options:
          - ios
          - android
          - both
      submit_review:
        description: "For iOS only: submit the latest uploaded build for App Review"
        type: boolean
        required: true
        default: false
      artifact_label:
        description: "Optional artifact label"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: native-release-${{ github.ref_name }}-${{ inputs.platform || 'both' }}
  cancel-in-progress: false

jobs:
  ios-artifacts:
    name: iOS Release
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-15
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh native-ios/scripts/healthcheck.sh

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install iOS Ruby gems
        working-directory: native-ios
        run: bundle install

      - name: Prepare App Store Connect API key
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APPSTORE_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

      - name: Run iOS release preflight
        run: bash scripts/preflight-release.sh --platform ios --layer 1

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run iOS release-readiness build
        run: SKIP_REMOTE_CHECKS=1 make verify-ios

      - name: Sync iOS signing assets
        working-directory: native-ios
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_PATH: ${{ runner.home }}/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_APP_IDENTIFIER: com.rammyinn.saintcharbel
        run: bundle exec fastlane ios setup

      - name: Upload iOS build to TestFlight
        working-directory: native-ios
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_PATH: ${{ runner.home }}/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_APP_IDENTIFIER: com.rammyinn.saintcharbel
        run: bundle exec fastlane ios beta

      - name: Upload iOS metadata
        if: ${{ inputs.submit_review }}
        working-directory: native-ios
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_PATH: ${{ runner.home }}/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          APP_STORE_APP_IDENTIFIER: com.rammyinn.saintcharbel
        run: bundle exec fastlane ios metadata

      - name: Submit iOS build for review
        if: ${{ inputs.submit_review }}
        working-directory: native-ios
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_PATH: ${{ runner.home }}/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          APP_STORE_APP_IDENTIFIER: com.rammyinn.saintcharbel
        run: bundle exec fastlane ios submit_review

      - name: Resolve artifact label
        id: meta
        env:
          INPUT_LABEL: ${{ inputs.artifact_label }}
        run: |
          label="${INPUT_LABEL:-${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}}"
          label="${label//\//-}"
          echo "label=$label" >> "$GITHUB_OUTPUT"

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.meta.outputs.label }}
          path: native-ios/build/SaintCharbelApp.ipa
          if-no-files-found: error

  android-artifacts:
    name: Android Artifacts
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh native-android/gradlew native-android/scripts/healthcheck.sh

      - name: Run Android release preflight
        run: bash scripts/preflight-release.sh --platform android --layer 1

      - name: Run Android release-readiness build
        run: SKIP_REMOTE_CHECKS=1 make verify-android

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: native-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Android release bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: native-android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
