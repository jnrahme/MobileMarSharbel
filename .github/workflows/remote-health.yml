name: Remote Dependency Health

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-remote:
    name: iOS Remote Health
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh native-ios/scripts/healthcheck.sh

      - name: Run iOS remote dependency health check
        run: SKIP_REMOTE_CHECKS=0 make remote-health-ios

  android-remote:
    name: Android Remote Health
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh native-android/gradlew native-android/scripts/healthcheck.sh

      - name: Run Android remote dependency health check
        run: SKIP_REMOTE_CHECKS=0 make remote-health-android

