name: iOS Metadata Sync

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional App Store version (defaults to MARKETING_VERSION)"
        required: false
        type: string
      locale:
        description: "App Store locale to sync"
        required: true
        default: "en-US"
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Run iOS preflight gate
        run: bash scripts/preflight-release.sh --platform ios --layer 1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: native-ios

      - name: Write App Store Connect key for fastlane
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Sync local App Store assets
        env:
          IOS_LOCALE: ${{ inputs.locale }}
        run: make ios-store-assets

      - name: Upload metadata and screenshots
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          IOS_LOCALE: ${{ inputs.locale }}
          IOS_VERSION: ${{ inputs.version }}
        run: make ios-metadata-sync
