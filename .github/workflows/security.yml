name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          mkdir -p "$HOME/.local/bin"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) ASSET="gitleaks_8.30.0_linux_x64.tar.gz" ;;
            aarch64|arm64) ASSET="gitleaks_8.30.0_linux_arm64.tar.gz" ;;
            *) echo "Unsupported arch: $ARCH" && exit 1 ;;
          esac
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/${ASSET}" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "push" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${BEFORE_SHA}..${HEAD_SHA}"
            gitleaks git --no-banner --redact --exit-code 1 --log-opts "--all $RANGE"
          elif git rev-parse "${HEAD_SHA}~1" >/dev/null 2>&1; then
            RANGE="${HEAD_SHA}~1..${HEAD_SHA}"
            gitleaks git --no-banner --redact --exit-code 1 --log-opts "--all $RANGE"
          else
            gitleaks git --no-banner --redact --exit-code 1
          fi

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Dependency graph is unavailable for ${GITHUB_REPOSITORY}; skipping dependency review." >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::Dependency graph is unavailable for ${GITHUB_REPOSITORY}; skipping dependency review."
          fi

      - uses: actions/dependency-review-action@v4
        if: steps.dependency-graph.outputs.available == 'true'
